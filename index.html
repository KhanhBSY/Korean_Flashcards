<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sejong 1 — Flashcards Tiếng Hàn</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F2EB; --surface: #FDFCF8; --ink: #1A1814; --ink-2: #5A5650; --ink-3: #9A958E;
    --accent: #2D5A3D; --accent-light: #EAF3DE; --border: rgba(26,24,20,0.12);
    --shadow: 0 2px 24px rgba(26,24,20,0.10), 0 1px 4px rgba(26,24,20,0.08); --dur: 0.55s;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1814; --surface: #232019; --ink: #F0EDE4; --ink-2: #AAA59C; --ink-3: #6A655E;
      --accent: #7EC898; --accent-light: #173404; --border: rgba(240,237,228,0.10);
      --shadow: 0 2px 24px rgba(0,0,0,0.40);
    }
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem 4rem; }
  header { text-align:center; margin-bottom:2.5rem; }
  header h1 { font-family:'Lora',serif; font-size:1.75rem; font-weight:600; letter-spacing:-0.02em; }
  header p { font-size:0.85rem; color:var(--ink-3); margin-top:0.35rem; }

  /* Chapter filter — extra row not in the reference, slotted above progress */
  .chapter-wrap { width:min(520px,100%); display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:1.25rem; }
  .ch-btn {
    font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500;
    padding:3px 12px; border-radius:20px; border:1px solid var(--border);
    background:var(--surface); color:var(--ink-3); cursor:pointer; transition:all 0.15s;
  }
  .ch-btn:hover { border-color:var(--accent); color:var(--accent); }
  .ch-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }

  .progress-wrap { width:min(520px,100%); margin-bottom:1.25rem; display:flex; align-items:center; gap:12px; }
  .progress-bar { flex:1; height:3px; background:var(--border); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width 0.3s; }
  .progress-label { font-size:0.8rem; color:var(--ink-3); white-space:nowrap; font-variant-numeric:tabular-nums; }

  .scene { width:min(520px,100%); height:320px; perspective:1000px; cursor:pointer; margin-bottom:1.5rem; }
  .card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform var(--dur) cubic-bezier(0.4,0,0.2,1); }
  .card.flipped { transform:rotateY(180deg); }
  .face {
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    background:var(--surface); border-radius:20px; border:1px solid var(--border);
    box-shadow:var(--shadow); padding:2.5rem 2.25rem; display:flex; flex-direction:column;
  }
  .face-front { justify-content:center; align-items:center; text-align:center; }
  .face-back  { transform:rotateY(180deg); justify-content:space-between; }
  .face-label { font-size:0.7rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-3); margin-bottom:1rem; }

  /* Front face — Vietnamese prompt */
  .meaning-text { font-family:'Lora',serif; font-size:1.35rem; line-height:1.55; color:var(--ink); }
  .chapter-tag {
    margin-top:1rem; display:inline-block; font-size:0.68rem; font-weight:500;
    color:var(--accent); background:var(--accent-light); padding:2px 9px; border-radius:4px;
  }
  .flip-hint { margin-top:1.5rem; font-size:0.75rem; color:var(--ink-3); }

  /* Back face — Korean answer */
  .back-word {
    font-family:'Lora',serif; font-size:2.4rem; font-weight:600;
    letter-spacing:-0.01em; color:var(--ink); line-height:1.2;
  }
  .back-word-latin { font-size:1rem; font-weight:400; color:var(--ink-2); margin-top:0.35rem; font-style:italic; }
  .back-example { font-family:'Lora',serif; font-style:italic; font-size:1rem; line-height:1.65; color:var(--ink-2); border-left:2px solid var(--accent); padding-left:1rem; margin-top:auto; }
  .back-example-label { font-family:'DM Sans',sans-serif; font-style:normal; font-size:0.68rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-bottom:0.5rem; display:block; }

  .controls { display:flex; align-items:center; gap:12px; width:min(520px,100%); }
  .btn {
    height:42px; padding:0 1.25rem; border:1px solid var(--border); background:var(--surface);
    color:var(--ink); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.85rem;
    font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
    transition:background 0.15s,border-color 0.15s,opacity 0.15s;
  }
  .btn:hover:not(:disabled) { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
  .btn:active:not(:disabled) { transform:scale(0.97); }
  .btn:disabled { opacity:0.3; cursor:not-allowed; }
  .btn-flip { flex:1; background:var(--accent); border-color:var(--accent); color:white; }
  .btn-flip:hover { opacity:0.88; }
  .row-btns { display:flex; gap:10px; width:min(520px,100%); margin-top:0.85rem; }
  .btn-sm { height:36px; font-size:0.75rem; padding:0 0.85rem; border-radius:8px; flex:1; }

  /* Direction toggle row */
  .dir-wrap { display:flex; gap:10px; width:min(520px,100%); margin-top:0.6rem; }
  .btn-dir { height:34px; font-size:0.73rem; padding:0 0.85rem; border-radius:8px; flex:1; }
  .btn-dir.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:500; }

  .keyboard-hint { text-align:center; font-size:0.72rem; color:var(--ink-3); margin-top:1rem; }
  kbd { display:inline-block; padding:1px 5px; border:1px solid var(--border); border-radius:4px; font-family:'DM Sans',sans-serif; font-size:0.65rem; color:var(--ink-3); }

  .status { text-align:center; padding:3rem 1rem; color:var(--ink-2); font-size:0.9rem; line-height:1.8; width:min(480px,100%); }
  .status.error { color:#A32D2D; }
  .dot-pulse { display:inline-flex; gap:5px; margin-top:0.75rem; }
  .dot-pulse span { width:6px; height:6px; border-radius:50%; background:var(--ink-3); animation:pulse 1.2s infinite ease-in-out; }
  .dot-pulse span:nth-child(2) { animation-delay:0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay:0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
</style>
</head>
<body>

<header>
  <h1>Sejong 1 — Tiếng Hàn</h1>
  <p id="subtitle">Đang tải từ Google Sheets…</p>
</header>

<div class="chapter-wrap" id="chapterWrap" style="display:none"></div>

<div id="app">
  <div class="status">
    Đang tải từ vựng…
    <div class="dot-pulse"><span></span><span></span><span></span></div>
  </div>
</div>

<script>
// Published CSV — CORS-free from GitHub Pages (https origin)
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRVaDIfMZP7kILdXbVsmf7pOxD3Z-6gtQCX7-LJQP7aZF6QjEhIWsrnMOlNTiEBxPRgR2ZA7LBIuHHf/pub?gid=0&single=true&output=csv';

let allCards=[], cards=[], current=0, flipped=false, colKeys=null, chapter='all', dir='vi2ko';

/* ── CSV parser ── */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const parseRow = row => {
    const out=[]; let cur='', inQ=false;
    for (let i=0; i<row.length; i++) {
      const c=row[i];
      if (c==='"' && !inQ) { inQ=true; continue; }
      if (c==='"' && inQ)  { if(row[i+1]==='"'){cur+='"';i++;} else inQ=false; continue; }
      if (c===',' && !inQ) { out.push(cur.trim()); cur=''; continue; }
      cur+=c;
    }
    out.push(cur.trim());
    return out;
  };
  const headers = parseRow(lines[0]).map(h => h.toLowerCase().trim());
  console.log('Headers:', headers);
  return lines.slice(1).filter(l=>l.trim()).map(l => {
    const vals=parseRow(l), obj={};
    headers.forEach((h,i) => obj[h] = vals[i]!==undefined ? vals[i].trim() : '');
    return obj;
  }).filter(r => Object.values(r).some(v=>v));
}

/* ── Column detection ── */
function findCol(hs, aliases) {
  for (const a of aliases) { const h=hs.find(k=>k.includes(a)); if(h!==undefined) return h; }
  return '';
}
function detectKeys(sample) {
  if (colKeys) return colKeys;
  const hs = Object.keys(sample);
  console.log('All keys:', hs);
  colKeys = {
    korean:  findCol(hs, ['한국', 'korean', 'từ vựng', 'tu vung', 'vocab', 'word'])  || hs[1] || '',
    vi:      findCol(hs, ['nghĩa', 'nghia', 'vietnamese', 'meaning', 'viet'])         || hs[2] || '',
    chapter: findCol(hs, ['chương', 'chuong', 'bài', 'bai', 'chapter', 'section'])   || hs[3] || '',
  };
  console.log('Column map:', colKeys);
  return colKeys;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ── Chapter filter ── */
function buildChapters() {
  const k = detectKeys(allCards[0]);
  const chapters = ['all', ...new Set(allCards.map(c => c[k.chapter]||'').filter(Boolean))];
  const wrap = document.getElementById('chapterWrap');
  wrap.style.display = 'flex';
  wrap.innerHTML = chapters.map(ch =>
    `<button class="ch-btn${ch===chapter?' active':''}" onclick="setChapter('${esc(ch)}')">${ch==='all'?'Tất cả':esc(ch)}</button>`
  ).join('');
}
function setChapter(ch) {
  chapter=ch;
  document.querySelectorAll('.ch-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim()===(ch==='all'?'Tất cả':ch))
  );
  const k=colKeys;
  cards = ch==='all' ? [...allCards] : allCards.filter(c=>(c[k.chapter]||'')===ch);
  current=0; flipped=false; render();
}

function doFlip() {
  flipped=!flipped;
  const c=document.getElementById('card'), b=document.getElementById('flipBtn');
  if(c) c.classList.toggle('flipped',flipped);
  if(b) b.textContent = flipped ? 'Xem câu hỏi' : 'Lật thẻ';
}
function go(d) { current=Math.max(0,Math.min(cards.length-1,current+d)); flipped=false; render(); }
function setDir(d) { dir=d; flipped=false; render(); }

function render() {
  if(!cards.length) { document.getElementById('app').innerHTML='<div class="status">Không có thẻ nào.</div>'; return; }
  const card=cards[current], k=detectKeys(card);
  const korean=card[k.korean]||'', vi=card[k.vi]||'', ch=card[k.chapter]||'';
  const pct=((current+1)/cards.length*100).toFixed(1);

  // Front = what the user sees first; Back = the answer
  const isVi2Ko = dir==='vi2ko';
  const frontLabel = isVi2Ko ? 'tiếng việt' : '한국어';
  const backLabel  = isVi2Ko ? '한국어' : 'tiếng việt';
  const frontMain  = isVi2Ko ? `<p class="meaning-text">${esc(vi)}</p>` : `<p class="back-word">${esc(korean)}</p>`;
  const backMain   = isVi2Ko
    ? `<div><div class="face-label">${backLabel}</div><p class="back-word">${esc(korean)}</p><p class="back-word-latin">${esc(vi)}</p></div>`
    : `<div><div class="face-label">${backLabel}</div><p class="meaning-text">${esc(vi)}</p></div>`;

  document.getElementById('app').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${current+1} / ${cards.length}</span>
    </div>
    <div class="scene" id="scene">
      <div class="card${flipped?' flipped':''}" id="card">
        <div class="face face-front">
          <div class="face-label">${frontLabel}</div>
          ${frontMain}
          ${ch ? `<span class="chapter-tag">${esc(ch)}</span>` : ''}
          <div class="flip-hint">↻ chạm để lật thẻ</div>
        </div>
        <div class="face face-back">
          ${backMain}
          <div class="back-example">
            <span class="back-example-label">chương</span>
            ${esc(ch)||'—'}
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn" ${current===0?'disabled':''}>← Trước</button>
      <button class="btn btn-flip" id="flipBtn">${flipped?'Xem câu hỏi':'Lật thẻ'}</button>
      <button class="btn" id="nextBtn" ${current===cards.length-1?'disabled':''}>Tiếp →</button>
    </div>
    <div class="dir-wrap">
      <button class="btn btn-sm btn-dir${dir==='vi2ko'?' active':''}" onclick="setDir('vi2ko')">🇻🇳 Việt → Hàn 🇰🇷</button>
      <button class="btn btn-sm btn-dir${dir==='ko2vi'?' active':''}" onclick="setDir('ko2vi')">🇰🇷 Hàn → Việt 🇻🇳</button>
    </div>
    <div class="row-btns">
      <button class="btn btn-sm" id="shuffleBtn">⇄ Xáo bài</button>
      <button class="btn btn-sm" id="reloadBtn">↺ Đồng bộ</button>
    </div>
    <p class="keyboard-hint"><kbd>Space</kbd> lật &nbsp;&nbsp; <kbd>←</kbd> trước &nbsp;&nbsp; <kbd>→</kbd> tiếp</p>
  `;

  document.getElementById('scene').addEventListener('click', doFlip);
  document.getElementById('flipBtn').addEventListener('click', e=>{e.stopPropagation();doFlip();});
  document.getElementById('prevBtn').addEventListener('click', ()=>go(-1));
  document.getElementById('nextBtn').addEventListener('click', ()=>go(1));
  document.getElementById('shuffleBtn').addEventListener('click', ()=>{ cards=shuffle(cards); current=0; flipped=false; render(); });
  document.getElementById('reloadBtn').addEventListener('click', ()=>{ allCards=[]; colKeys=null; init(); });
}

document.addEventListener('keydown', e => {
  if(!cards.length) return;
  if(e.key===' '||e.key==='Enter') { e.preventDefault(); doFlip(); }
  if(e.key==='ArrowRight') go(1);
  if(e.key==='ArrowLeft') go(-1);
});

async function init() {
  document.getElementById('app').innerHTML = `<div class="status">Đang tải từ vựng…<div class="dot-pulse"><span></span><span></span><span></span></div></div>`;
  document.getElementById('subtitle').textContent = 'Đang tải từ Google Sheets…';
  try {
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allCards = parseCSV(text);
    if(!allCards.length) throw new Error('Sheet loaded nhưng không có dữ liệu.');
    colKeys = null;
    detectKeys(allCards[0]);
    cards = [...allCards];
    document.getElementById('subtitle').textContent = `${allCards.length} thẻ · đồng bộ từ Google Sheets ✓`;
    buildChapters();
    render();
  } catch(err) {
    document.getElementById('subtitle').textContent = 'Không thể tải dữ liệu';
    document.getElementById('app').innerHTML = `
      <div class="status error">
        <strong>Không thể tải sheet.</strong><br>${esc(err.message)}<br><br>
        Hãy đảm bảo sheet đã được publish (File → Share → Publish to web).<br><br>
        <button class="btn" onclick="init()" style="margin:0 auto">↺ Thử lại</button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
